<div id="lightbox" class="lightbox" style="display:none;" onclick="if(event.target===this)closeLightbox();">
  <img id="lb-img" src="" alt="">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
</div>

<script>
let activeFilter = 'life';

function setFilter(f) {
  activeFilter = f;
  ['life','graduation','engagements'].forEach(id => {
    document.getElementById('grid-' + id).style.display = id === f ? '' : 'none';
    const btn = document.getElementById('tab-' + id);
    btn.className = 'tab-btn ' + (id === f ? 'active' : 'inactive');
  });
}

function openPhoto(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').style.display = 'flex';
}
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function buildGrid(containerId, photos) {
  const container = document.getElementById(containerId);
  photos.forEach(photo => {
    const fig = document.createElement('figure');
    fig.className = 'photo-grid-item reveal';
    fig.style.margin = '0';
    fig.style.cursor = 'zoom-in';

    const slot = document.createElement('div');
    slot.className = 'img-slot photo-natural';
    slot.style.cssText = 'width:100%;';

    if (photo.src) {
      const img = document.createElement('img');
      img.src = photo.src;
      img.alt = photo.caption || '';
      img.onerror = () => { slot.innerHTML = '<div class="placeholder-label">Photo</div>'; slot.classList.remove('has-image'); };
      slot.appendChild(img);
      slot.classList.add('has-image');
      fig.addEventListener('click', () => openPhoto(photo.src));
    } else {
      slot.innerHTML = '<div class="placeholder-label">Photo</div>';
    }

    const cap = document.createElement('figcaption');
    cap.style.cssText = "font-family:'JetBrains Mono',monospace;font-size:11px;color:#9a917f;margin-top:10px;";
    cap.textContent = photo.caption || '';

    fig.appendChild(slot);
    fig.appendChild(cap);
    container.appendChild(fig);
  });
}

fetch('content.json').then(r => r.json()).then(data => {
  const cats = ['life', 'graduation', 'engagements'];
  cats.forEach(cat => {
    const photos = data.photos[cat] || [];
    document.getElementById('count-' + cat).textContent = photos.length;
    buildGrid('photos-' + cat, photos);
  });
});
</script>
