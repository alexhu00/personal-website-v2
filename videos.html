<div id="lightbox" class="lightbox" style="display:none;" onclick="if(event.target===this)closeLightbox();">
  <div id="lb-video" style="width:90vw;max-width:560px;aspect-ratio:9/16;"></div>
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
</div>

<script>
function openVideo(v) {
  const vd = document.getElementById('lb-video');
  if (v.src) {
    vd.innerHTML = `<video src="${v.src}" style="width:100%;height:100%;border-radius:6px;background:#000;" controls autoplay playsinline></video>`;
  } else if (v.url) {
    const yt = v.url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
    const embedUrl = yt ? `https://www.youtube.com/embed/${yt[1]}?autoplay=1` : v.url;
    vd.innerHTML = `<iframe src="${embedUrl}" style="width:100%;height:100%;border:none;border-radius:6px;" allow="autoplay;fullscreen" allowfullscreen></iframe>`;
  }
  document.getElementById('lightbox').style.display = 'flex';
}
function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
  document.getElementById('lb-video').innerHTML = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

fetch('content.json').then(r => r.json()).then(data => {
  const grid = document.getElementById('video-grid');

  data.videos.forEach(v => {
    const article = document.createElement('article');
    article.classList.add('reveal');

    const thumbWrap = document.createElement('div');
    thumbWrap.style.cssText = 'position:relative;cursor:pointer;border-radius:6px;overflow:hidden;aspect-ratio:9/16;background:#1a1714;';
    thumbWrap.addEventListener('click', () => openVideo(v));

    if (v.src) {
      const vid = document.createElement('video');
      vid.src = v.src;
      vid.preload = 'metadata';
      vid.muted = true;
      vid.playsInline = true;
      vid.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
      vid.addEventListener('loadedmetadata', () => { vid.currentTime = v.previewTime ?? 3; });
      thumbWrap.addEventListener('mouseenter', () => { vid.currentTime = v.previewTime ?? 3; vid.play(); });
      thumbWrap.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = v.previewTime ?? 3; });
      thumbWrap.appendChild(vid);
    } else if (v.thumb) {
      const img = document.createElement('img');
      img.src = v.thumb; img.alt = v.title;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
      thumbWrap.appendChild(img);
    }

    const badge = document.createElement('span');
    badge.style.cssText = 'position:absolute;left:12px;bottom:12px;pointer-events:none;width:36px;height:36px;border-radius:999px;background:rgba(27,23,20,0.78);color:#f5f1e8;display:flex;align-items:center;justify-content:center;font-size:12px;padding-left:3px;';
    badge.textContent = '▶';
    thumbWrap.appendChild(badge);

    const title = document.createElement('h3');
    title.style.cssText = "font-family:'Newsreader',serif;font-weight:400;font-size:19px;margin:14px 0 0;color:#1B1714;";
    title.textContent = v.title;

    const tag = document.createElement('span');
    tag.style.cssText = "font-family:'JetBrains Mono',monospace;font-size:11px;color:#9a917f;";
    tag.textContent = v.tag || '';

    article.appendChild(thumbWrap);
    article.appendChild(title);
    article.appendChild(tag);

    if (v.instagram) {
      const ig = document.createElement('a');
      ig.href = v.instagram;
      ig.target = '_blank';
      ig.style.cssText = "display:inline-block;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#897F70;text-decoration:none;";
      ig.textContent = 'Instagram ↗';
      article.appendChild(ig);
    }

    grid.appendChild(article);
  });
});
</script>
